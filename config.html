<!DOCTYPE html>
<html lang="pt-AO">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Definições - ENGLISH PRACTICE</title>
    <link rel="stylesheet" href="bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="navbar-left">
            <i class="bi bi-list menu-icon" id="btn-menu"></i>
            <h1><i class="bi bi-book"></i> ENGLISH PRACTICE</h1>
        </div>
    </header>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>MENU PRINCIPAL</h2>
            <i class="bi bi-x-lg" id="btn-fechar"></i>
        </div>
        <nav>
            <a href="index.html"><i class="bi bi-house-door"></i> Início</a>
            <a href="membros.html"><i class="bi bi-people"></i> Gerir Membros</a>
            <a href="config.html" class="ativo"><i class="bi bi-gear"></i> Definições</a>
            <a href="relatorios.html"><i class="bi bi-files"></i> Banco de Perguntas</a>
        </nav>
    </aside>
    <div class="overlay" id="overlay"></div>

    <main class="container">
        <div class="card">
            <div class="card-header">
                <h2>Definições do Sistema</h2>
            </div>
            
            <!-- ESCOLHA DA FONTE -->
            <div class="form-group">
                <label>Fonte das Perguntas</label>
                <div style="display:flex; gap:20px; margin-top:8px;">
                    <label style="font-weight:400; cursor:pointer;"><input type="radio" name="fonte" id="fonte-api" value="api"> Usar API Externa</label>
                    <label style="font-weight:400; cursor:pointer;"><input type="radio" name="fonte" id="fonte-bd" value="bd" checked> Usar Banco de Dados Local</label>
                </div>
            </div>

            <!-- BLOCO DA API -->
            <div id="config-api" style="display:none; border-left:3px solid var(--azul-botao--); padding-left:15px; margin-bottom:20px;">
                <div class="form-group">
                    <label for="api-key">Chave da API</label>
                    <input type="password" id="api-key" placeholder="sk-xxxxxxxxxxxxxxxx" style="width:100%; padding:12px; border:1px solid var(--borda--); border-radius:4px;">
                    <small style="color:#6B7280;">A chave fica salva apenas neste navegador. Não é enviada para nenhum servidor.</small>
                </div>
                <div class="form-group">
                    <label for="modelo-api">Modelo</label>
                    <select id="modelo-api" style="width:100%; padding:12px; border:1px solid var(--borda--); border-radius:4px;">
                        <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
                        <option value="gpt-4o-mini">GPT-4o Mini</option>
                    </select>
                </div>
            </div>

            <!-- BLOCO DO BANCO DE DADOS -->
            <div id="config-bd">
                <div class="form-group">
                    <label for="qtd-perguntas">Nº de Perguntas por Membro</label>
                    <input type="number" id="qtd-perguntas" value="2" min="1" max="10" style="width:100%; padding:12px; border:1px solid var(--borda--); border-radius:4px;">
                </div>
                <div class="form-group">
                    <label for="tempo-resposta">Tempo por Pergunta (segundos)</label>
                    <input type="number" id="tempo-resposta" value="30" min="10" max="120" style="width:100%; padding:12px; border:1px solid var(--borda--); border-radius:4px;">
                </div>
                <p style="font-size:13px; color:#6B7280;">Para adicionar perguntas vá em "Banco de Perguntas" no menu.</p>
            </div>

            <button class="btn-principal" id="btn-salvar-config">Salvar Definições</button>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
