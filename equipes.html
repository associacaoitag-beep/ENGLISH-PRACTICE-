<!DOCTYPE html>
<html lang="pt-AO">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENGLISH PRACTICE - Gerir Equipes</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="navbar-left">
            <i class="bi bi-list menu-icon" id="btn-menu"></i>
            <h1><i class="bi bi-book"></i> ENGLISH PRACTICE</h1>
        </div>
    </header>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>MENU PRINCIPAL</h2>
            <i class="bi bi-x-lg" id="btn-fechar"></i>
        </div>
        <nav>
            <a href="index.html"><i class="bi bi-house-door"></i> Início</a>
            <a href="membros.html"><i class="bi bi-people"></i> Gerir Membros</a>
            <a href="equipes.html" class="ativo"><i class="bi bi-diagram-3"></i> Gerir Equipes</a>
            <a href="config.html"><i class="bi bi-gear"></i> Definições</a>
            <a href="relatorios.html"><i class="bi bi-files"></i> Banco de Perguntas</a>
        </nav>
    </aside>

    <div class="overlay" id="overlay"></div>

    <main class="container">
        <div class="card">
            <div class="card-header">
                <h2><i class="bi bi-diagram-3"></i> Gerir Equipes</h2>
            </div>
            <p class="card-desc">Total de Equipes: <b><span id="total-equipes">0</span></b></p>

            <div style="margin-bottom:20px;">
                <label>Nome da Equipe:</label>
                <input type="text" id="input-equipe" class="input-field" placeholder="Ex: Equipe A" style="margin-bottom:10px;">
                <button class="btn-principal" id="btn-add-equipe" style="margin-bottom:15px;">
                    <i class="bi bi-plus-circle"></i> Adicionar Equipe
                </button>
            </div>

            <div>
                <h3 style="margin-bottom:15px;">Equipes Criadas</h3>
                <div id="lista-equipes"></div>
            </div>

            <h3 style="margin-top:30px; margin-bottom:15px;">Adicionar Membros às Equipes</h3>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <select id="select-equipe" class="input-field" style="flex:1;">
                    <option value="">Selecione uma equipe</option>
                </select>
                <select id="select-membro" class="input-field" style="flex:1;">
                    <option value="">Selecione um membro</option>
                </select>
                <button class="btn-principal" id="btn-add-membro-equipe" style="flex:0.5;">
                    <i class="bi bi-plus"></i> Adicionar
                </button>
            </div>

            <div id="membros-por-equipe"></div>
        </div>
    </main>

    <script src="config-ia.js"></script>
    <script src="script.js"></script>
</body>
</html>
